<a [routerLink]="['/movie', movie.imdbID]" class="result-card" [id]="'result-' + movie.imdbID">
  <button
    class="fav-btn"
    [class.fav-active]="favorite"
    (click)="onFavoriteToggle($event)"
    [attr.aria-label]="favorite ? 'Retirer des favoris' : 'Ajouter aux favoris'"
    [id]="'fav-' + movie.imdbID"
  >
    <svg width="16" height="16" viewBox="0 0 24 24" [attr.fill]="favorite ? 'currentColor' : 'none'" stroke="currentColor" stroke-width="2">
      <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
    </svg>
  </button>

  <div class="result-poster-wrap">
    <img [src]="getPosterUrl(movie.Poster)" [alt]="movie.Title" loading="lazy" class="result-poster-img"/>
    <div class="result-overlay">
      <span class="overlay-view">Voir détails</span>
    </div>
  </div>

  <div class="result-info">
    <span class="result-type" [ngClass]="'type-' + movie.Type">{{ movie.Type | uppercase }}</span>
    <h3 class="result-title">{{ movie.Title }}</h3>
    <span class="result-year">{{ movie.Year }}</span>
  </div>
</a>
