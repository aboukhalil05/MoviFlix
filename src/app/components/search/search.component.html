<div class="search-page">

  <!-- ── Search Header ──────────────────────────────── -->
  <div class="search-header">
    <div class="header-grid"></div>
    <div class="header-content">
      <span class="header-tag">Explorez</span>
      <h1 class="header-title">Recherche de Films</h1>

      <!-- Search bar -->
      <div class="search-bar-wrap" id="search-bar">
        <ng-icon name="heroMagnifyingGlass" class="bar-icon" size="18"></ng-icon>
        <input
          type="text"
          id="search-main-input"
          [(ngModel)]="query"
          (ngModelChange)="onInputChange()"
          (keydown)="onKeyEnter($event)"
          placeholder="Titre d'un film, série…"
          class="bar-input"
          autofocus
        />
        <button *ngIf="query" id="btn-clear-search" class="bar-clear" (click)="clearSearch()">
          <ng-icon name="heroXMark" size="14"></ng-icon>
        </button>
        <button id="btn-search" class="bar-submit" (click)="onSearch()">Chercher</button>
      </div>

      <div class="search-filters">
        <div class="type-toggle-group" role="tablist" aria-label="Filtrer par type">
          <button
            *ngFor="let type of typeOptions"
            type="button"
            class="type-toggle"
            [class.type-toggle-active]="selectedType === type.value"
            (click)="onTypeChange(type.value)"
          >
            {{ type.label }}
          </button>
        </div>

        <div class="year-filter">
          <label for="year-input" class="year-label">Année</label>
          <input
            id="year-input"
            type="number"
            min="1900"
            max="2100"
            step="1"
            class="year-input"
            placeholder="Ex: 2024"
            [(ngModel)]="year"
            (ngModelChange)="onYearChange()"
          />
        </div>
      </div>
    </div>
  </div>

  <!-- ── Results meta ────────────────────────────────── -->
  <div class="results-zone">

    <div class="results-meta" *ngIf="totalResults > 0 && !loading">
      <span class="meta-text">
        <strong class="meta-count">{{ totalResults }}</strong> résultats pour
        <em class="meta-query">"{{ query }}"</em>
      </span>
      <span class="pagination-info">Page {{ currentPage }} / {{ totalPages }}</span>
    </div>

    <!-- ── Loading ─────────────────────────────────────── -->
    <div class="spinner-wrap" *ngIf="loading">
      <div class="mv-spinner"></div>
      <p class="loading-label">Recherche en cours…</p>
    </div>

    <!-- ── Error ───────────────────────────────────────── -->
    <div class="error-box" *ngIf="error && !loading">
      <ng-icon name="heroExclamationTriangle" class="error-icon" size="22"></ng-icon>
      <div class="error-body">
        <p class="error-msg">{{ error }}</p>
        <p class="error-hint">Essayez un autre titre ou vérifiez l'orthographe.</p>
      </div>
    </div>

    <!-- ── Empty state ─────────────────────────────────── -->
    <div class="empty-state" *ngIf="!loading && !error && results.length === 0 && !query">
      <ng-icon name="heroMagnifyingGlass" class="empty-icon" size="48"></ng-icon>
      <h2 class="empty-title">À votre recherche</h2>
      <p class="empty-desc">Commencez à taper pour découvrir des films et séries.</p>
    </div>

    <!-- ── Results grid ────────────────────────────────── -->
    <div class="results-grid" *ngIf="!loading && results.length > 0">
      <app-movie-card
        *ngFor="let movie of results"
        [movie]="movie"
        [favorite]="isFavorite(movie.imdbID)"
        (favoriteToggle)="toggleFavorite($event.event, $event.movie)"
      />
    </div>

    <!-- ── Pagination ───────────────────────────────────── -->
    <nav class="pagination" *ngIf="totalPages > 1 && !loading" aria-label="Pagination">
      <button id="btn-prev-page" (click)="goToPage(currentPage - 1)" [disabled]="currentPage === 1" class="page-btn page-arrow">
        <ng-icon name="heroChevronLeft" size="16"></ng-icon>
      </button>

      <button
        *ngFor="let p of pageNumbers"
        (click)="goToPage(p)"
        class="page-btn"
        [class.page-active]="p === currentPage"
        id="btn-page-{{ p }}"
      >{{ p }}</button>

      <button id="btn-next-page" (click)="goToPage(currentPage + 1)" [disabled]="currentPage === totalPages" class="page-btn page-arrow">
        <ng-icon name="heroChevronRight" size="16"></ng-icon>
      </button>
    </nav>

  </div>
</div>
