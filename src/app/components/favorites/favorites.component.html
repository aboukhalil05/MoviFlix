<div class="favorites-page">

  <!-- ── Page Header ──────────────────────────────────── -->
  <div class="page-header">
    <div class="header-grid-bg"></div>
    <div class="page-header-inner">
      <div class="header-left">
        <span class="page-tag">Collection</span>
        <h1 class="page-title" id="favorites-title">Mes Favoris</h1>
        <span class="count-badge" *ngIf="favorites.length > 0">
          {{ favorites.length }} film{{ favorites.length > 1 ? 's' : '' }}
        </span>
      </div>
      <button
        id="btn-clear-all"
        class="clear-all-btn"
        *ngIf="favorites.length > 0"
        (click)="clearAll()"
      >
        <ng-icon name="heroTrash" size="14"></ng-icon>
        Tout supprimer
      </button>
    </div>
  </div>

  <div class="favorites-body">

    <!-- ── Empty state ─────────────────────────────────── -->
    <div class="empty-state" *ngIf="favorites.length === 0">
      <div class="empty-heart">
        <ng-icon name="heroHeart" size="48"></ng-icon>
      </div>
      <h2 class="empty-title">Aucun favori pour l'instant</h2>
      <p class="empty-desc">Parcourez des films et cliquez sur le cœur pour les sauvegarder ici.</p>
      <a routerLink="/search" class="browse-btn" id="btn-browse-movies">
        <ng-icon name="heroMagnifyingGlass" size="16"></ng-icon>
        Parcourir les films
      </a>
    </div>

    <!-- ── Favorites Grid ───────────────────────────────── -->
    <div class="favorites-grid" *ngIf="favorites.length > 0">
      <a
        *ngFor="let movie of favorites"
        [routerLink]="['/movie', movie.imdbID]"
        class="fav-card"
        id="fav-card-{{ movie.imdbID }}"
      >
        <!-- Remove button -->
        <button
          class="remove-btn"
          (click)="removeFromFavorites($event, movie)"
          aria-label="Retirer des favoris"
          title="Retirer"
          id="remove-{{ movie.imdbID }}"
        >
          <ng-icon name="heroXMark" size="12"></ng-icon>
        </button>

        <!-- Poster -->
        <div class="fav-poster">
          <img [src]="getPosterUrl(movie.Poster)" [alt]="movie.Title" loading="lazy" class="fav-poster-img"/>
          <div class="fav-overlay">
            <span class="fav-view">Voir détails</span>
          </div>
        </div>

        <!-- Info -->
        <div class="fav-info">
          <span class="fav-type" [class.type-series]="movie.Type === 'series'">
            {{ movie.Type | uppercase }}
          </span>
          <h3 class="fav-title">{{ movie.Title }}</h3>
          <span class="fav-year">{{ movie.Year }}</span>
        </div>
      </a>
    </div>

  </div>
</div>
